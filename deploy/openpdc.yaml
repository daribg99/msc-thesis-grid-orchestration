apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpdc
  labels:
    app: openpdc
spec:
  selector:
    matchLabels:
      app: openpdc
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openpdc
    spec:
      initContainers:
      - name: openpdc-init
        image: harbor.crownlabs.polito.it/cloud-sandbox/s333985/test-openpdc-init@sha256:8584430dc9fc38233a77d80f946659c6da2816ee919e96763b7e7a8c8f2613cd
        env:
            - name: DB_ROOTPASS
              valueFrom:
                secretKeyRef:
                  name: cluster-db-secrets
                  key: root
            - name: DB_USER
              value: openpdc
            - name: DB_PASS
              value: password
            - name: DB_NAME
              value: lower
            - name: DB_PORT
              value: "30950"
            - name: DB_URL
              value: "172.18.0.5"
      containers:
      - name: openpdc
        image: harbor.crownlabs.polito.it/cloud-sandbox/s333985/claudious96/openpdc@sha256:a42f96354f2ef90fde8f6b21c9f189a284fd3fd6d9a0a0801acc38a8ceb97214
        env:
            - name: DB_USER
              value: openpdc
            - name: DB_PASS
              value: password
            - name: DB_NAME
              value: lower
            - name: DB_PORT
              value: "30950"
            - name: DB_URL
              value: "172.18.0.5"
            - name: NODE_ID
              value: e7a5235d-cb6f-4864-a96e-a8686f36e599
        ports:
        - name: outputstream
          containerPort: 4712
          protocol: TCP
        - name: datapublisher
          containerPort: 6165
          protocol: TCP
        - name: console
          containerPort: 8500
          protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  name: openpdc
spec:
  type: NodePort
  ports:
    - name: console
      port: 8500
      targetPort: 8500
      nodePort: 30085
    - name: outputstream
      port: 4712
      nodePort: 30099
    - name: datapublisher
      port: 6165
      targetPort: 6165
      nodePort: 30065
  selector:
    app: openpdc
