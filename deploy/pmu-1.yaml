apiVersion: v1
binaryData:
  pmu.bin: MTUwMDAKNDcxMgpDRkcgMSAxMzQKqjEAhgABYOb4aQCtpbgA////AAFwbXUtMSAgICAgICAgICAgAAEAAAADAAEAAEEgICAgICAgICAgICAgICBCICAgICAgICAgICAgICAgQyAgICAgICAgICAgICAgIEUgICAgICAgICAgICAgICAABR9NAAUfTQAFH00BAAFPAAEAAAAZ83QK 
kind: ConfigMap
metadata:
  name: pmu-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pmu-1
spec:
  selector:
    matchLabels:
      app: pmu-1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pmu-1
    spec:
      containers:
      - name: pmu
        image: harbor.crownlabs.polito.it/cloud-sandbox/s333985/claudious96/pmu-cli@sha256:bcc5fe2237ed113266e09d0d0b20b05101a2e03b63d8fe4776084cc12ece248b
        command: [ "PMU", "-i", "pmu.bin" ]
        ports:
        - containerPort: 4712
        env:
        - name: TERM
          value: xterm
        volumeMounts:
        - name: pmu-1
          mountPath: /pmu.bin
          subPath: pmu.bin
        livenessProbe:
          tcpSocket:
            port: 4712
          initialDelaySeconds: 15
          periodSeconds: 20

      volumes:
        - name: pmu-1
          configMap:
            name: pmu-1
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: pmu-1
  labels:
    name: pmu-1
spec:
  type: NodePort
  ports:
