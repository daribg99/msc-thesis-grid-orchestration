# filepath: .github/workflows/update-readme-date.yml
name: Update README last-updated

on:
  push:
permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update last updated date in README
        run: |
          FILE="README.md"
          DATE="$(date -u '+%-d %B %Y')"

          if grep -q 'Last updated:' "$FILE"; then
            # replace everything after "Last updated:" preserving any prefix (bullets/emoji)
            sed -E -i "s|(Last updated:).*|\1 $DATE|" "$FILE"
          else
            # append a new line with the marker (keeps file readable)
            echo "" >> "$FILE"
            echo "📅 Last updated: $DATE" >> "$FILE"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "[bot]: update README last updated to $DATE" || echo "no changes to commit"
          git push
